name: test-reconciliation-storm-fix

on:
  workflow_dispatch:
  push:
    branches:
      - 'fix/reconciliation-storm'

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: 1.25.6
    - name: Build
      run: make build
    - name: Vet
      run: make vet
    - name: Lint
      run: make lint

  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: 1.25.6
    - name: Unit tests
      run: make test

  fv-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: 1.25.6
    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: FV tests
      run: make create-cluster fv

  publish-image:
    needs: [build-and-lint, unit-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push image
      env:
        IMAGE_TAG: ghcr.io/${{ github.repository }}:reconcile-fix
      run: |
        docker build --build-arg BUILDOS=linux --build-arg TARGETARCH=amd64 \
          -t "$IMAGE_TAG" .
        docker push "$IMAGE_TAG"
        echo "Image pushed to $IMAGE_TAG"
